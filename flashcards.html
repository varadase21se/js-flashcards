<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flashcards ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --surface2:#f0ede7;
  --border:#e2ddd6;
  --border2:#ccc8c0;
  --accent:#ff4f30;
  --accent2:#ffa630;
  --accent-bg:#fff0ed;
  --text:#1a1714;
  --text2:#6b6560;
  --text3:#a8a29c;
  --done:#1a7a50;
  --done-bg:#e2f5ed;
  --rev:#c07000;
  --rev-bg:#fff5e0;
  --weak:#d42020;
  --weak-bg:#fce8e8;
  --sidebar:#ede9e2;
  --sidebar-w:230px;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
}

/* subtle dot pattern bg */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:radial-gradient(circle, #c8c3bb 1px, transparent 1px);
  background-size:24px 24px;
  opacity:.35;
  pointer-events:none;
  z-index:0;
}

.layout{display:flex;width:100%;min-height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);
  min-height:100vh;
  background:var(--sidebar);
  border-right:1.5px solid var(--border2);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.sidebar-header{
  padding:20px 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.sidebar-title{
  font-family:var(--font-display);
  font-size:11px;
  font-weight:700;
  color:var(--text3);
  letter-spacing:.1em;
  text-transform:uppercase;
}
.sidebar-add-set{
  background:var(--accent);
  border:none;
  color:#fff;
  cursor:pointer;
  font-size:15px;
  line-height:1;
  padding:3px 7px;
  border-radius:6px;
  transition:transform .12s,background .12s;
  font-family:var(--font-body);
}
.sidebar-add-set:hover{background:#d93a1e;transform:scale(1.08)}
.sidebar-section{padding:4px 8px;margin-bottom:4px}
.sidebar-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  transition:background .12s,transform .1s;
  position:relative;
  margin-bottom:2px;
}
.sidebar-item:hover{background:var(--border);transform:translateX(2px)}
.sidebar-item.active{
  background:var(--accent);
  color:#fff;
}
.sidebar-item-icon{font-size:16px;flex-shrink:0}
.sidebar-item-name{
  font-family:var(--font-body);
  font-size:13.5px;
  font-weight:500;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.sidebar-item-count{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text3);
  flex-shrink:0;
  background:var(--surface2);
  padding:2px 6px;
  border-radius:5px;
}
.sidebar-item.active .sidebar-item-name{color:#fff}
.sidebar-item.active .sidebar-item-count{background:rgba(255,255,255,.25);color:#fff}
.sidebar-del-btn{
  background:none;
  border:none;
  cursor:pointer;
  color:var(--text3);
  font-size:14px;
  padding:2px 4px;
  border-radius:4px;
  opacity:0;
  transition:opacity .1s;
}
.sidebar-item:hover .sidebar-del-btn{opacity:1}
.sidebar-del-btn:hover{color:var(--weak);background:var(--weak-bg)}
.sidebar-item.active .sidebar-del-btn{color:rgba(255,255,255,.6)}
.sidebar-item.active .sidebar-del-btn:hover{color:#fff;background:rgba(255,255,255,.2)}

/* SIDEBAR FOOTER */
.sidebar-footer{
  margin-top:auto;
  padding:14px 16px;
  font-family:var(--font-display);
  font-size:18px;
  font-weight:800;
  color:var(--text3);
  letter-spacing:-.02em;
  border-top:1px solid var(--border);
}
.sidebar-footer span{color:var(--accent)}

/* MAIN */
.main{flex:1;max-width:680px;padding:2.5rem 2.2rem 3rem;margin:0 auto;min-width:0}

/* TOP BAR */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem}
.topbar-left h1{
  font-family:var(--font-display);
  font-size:2rem;
  font-weight:800;
  color:var(--text);
  letter-spacing:-.04em;
  line-height:1.1;
}
.topbar-left h1 .subject-icon{margin-right:6px}
.subject-label{
  font-family:var(--font-body);
  font-size:13px;
  color:var(--text3);
  margin-top:4px;
  font-weight:400;
}
.topbar-right{display:flex;gap:8px;padding-top:4px}
.icon-btn{
  background:var(--surface);
  border:1.5px solid var(--border2);
  color:var(--text2);
  padding:7px 14px;
  border-radius:9px;
  font-size:13px;
  font-family:var(--font-body);
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  transition:all .12s;
}
.icon-btn:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-1px)}
.add-btn{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.add-btn:hover{background:#d93a1e;border-color:#d93a1e;transform:translateY(-1px)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{
  background:var(--surface);
  border-radius:12px;
  border:1.5px solid var(--border);
  padding:.75rem .8rem;
  text-align:center;
  transition:transform .12s,box-shadow .12s;
  cursor:default;
}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-n{
  font-family:var(--font-display);
  font-size:1.4rem;
  font-weight:800;
  color:var(--text);
}
.stat-n.done{color:var(--done)}
.stat-n.rev{color:var(--rev)}
.stat-n.weak{color:var(--weak)}
.stat-l{
  font-family:var(--font-body);
  font-size:11px;
  font-weight:600;
  color:var(--text3);
  margin-top:2px;
  text-transform:uppercase;
  letter-spacing:.06em;
}

/* FILTER TABS */
.tabs{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  margin-bottom:1.3rem;
  background:var(--surface2);
  border-radius:12px;
  padding:4px;
  border:1.5px solid var(--border);
}
.tab{
  padding:6px 14px;
  border-radius:8px;
  border:none;
  background:none;
  color:var(--text2);
  font-size:12.5px;
  font-family:var(--font-body);
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  flex:1;
  text-align:center;
}
.tab:hover:not(.active){background:var(--border);color:var(--text)}
.tab.active{
  background:var(--surface);
  color:var(--accent);
  font-weight:600;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

/* PROGRESS */
.prog-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  font-family:var(--font-mono);
  color:var(--text3);
  margin-bottom:7px;
}
.prog-track{
  height:4px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:1.5rem;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* CARD */
.scene{
  perspective:1200px;
  height:260px;
  cursor:pointer;
  margin-bottom:.75rem;
  position:relative;
}
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;
  inset:0;
  border-radius:16px;
  border:1.5px solid var(--border2);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2.2rem;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  transition:border-color .15s,box-shadow .15s;
}
.scene:hover .card-face{
  border-color:var(--accent);
  box-shadow:0 6px 24px rgba(255,79,48,.12);
}
.card-front{background:var(--surface)}
.card-back{
  background:var(--text);
  border-color:var(--text);
  transform:rotateY(180deg);
}
.card-tag{
  font-family:var(--font-display);
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:1rem;
  color:var(--text3);
}
.card-back .card-tag{color:rgba(255,255,255,.4)}
.card-q-text{
  font-family:var(--font-body);
  font-size:1.1rem;
  font-weight:600;
  text-align:center;
  line-height:1.55;
  color:var(--text);
}
.card-a-text{
  font-family:var(--font-body);
  font-size:.95rem;
  font-weight:400;
  text-align:center;
  line-height:1.75;
  color:rgba(255,255,255,.85);
}
.cat-pip{
  position:absolute;
  top:14px;
  right:14px;
  font-size:11px;
  font-family:var(--font-body);
  font-weight:600;
  padding:3px 10px;
  border-radius:6px;
}
.cat-pip.done{background:var(--done-bg);color:var(--done)}
.cat-pip.revision{background:var(--rev-bg);color:var(--rev)}
.cat-pip.weak{background:var(--weak-bg);color:var(--weak)}

/* flip hint */
.flip-hint{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text3);
  letter-spacing:.06em;
  pointer-events:none;
  opacity:.7;
}

/* HINT */
.hint{
  text-align:center;
  font-family:var(--font-body);
  font-size:11px;
  color:var(--text3);
  margin-bottom:.9rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.kbd{
  display:inline-block;
  background:var(--surface);
  border:1.5px solid var(--border2);
  border-radius:5px;
  padding:1px 7px;
  font-size:10px;
  font-family:var(--font-mono);
  font-weight:500;
  color:var(--text2);
  box-shadow:0 1px 0 var(--border2);
}

/* CATEGORY BUTTONS */
.cat-row{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:1.1rem;
  flex-wrap:wrap;
}
.cat-label{
  font-family:var(--font-body);
  font-size:12px;
  font-weight:600;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.cat-btn{
  padding:5px 13px;
  border-radius:8px;
  border:1.5px solid transparent;
  font-size:12px;
  font-family:var(--font-body);
  font-weight:600;
  cursor:pointer;
  transition:all .13s;
}
.cat-btn:hover{transform:translateY(-1px)}
.cat-btn:active{transform:scale(.97)}
.cat-btn.done{background:var(--done-bg);color:var(--done);border-color:#a8dfc8}
.cat-btn.done:hover,.cat-btn.done.active{background:#c4ead9;border-color:var(--done)}
.cat-btn.revision{background:var(--rev-bg);color:var(--rev);border-color:#f0c97a}
.cat-btn.revision:hover,.cat-btn.revision.active{background:#ffe7a8;border-color:var(--rev)}
.cat-btn.weak{background:var(--weak-bg);color:var(--weak);border-color:#f5b0b0}
.cat-btn.weak:hover,.cat-btn.weak.active{background:#fbcdcd;border-color:var(--weak)}
.cat-btn.clear{background:var(--surface2);color:var(--text2);border-color:var(--border2)}
.cat-btn.clear:hover{background:var(--border);color:var(--text)}
.cat-btn.active{box-shadow:0 0 0 2.5px currentColor}

/* NAV */
.nav-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1rem;
  gap:10px;
}
.nav-btn{
  padding:8px 20px;
  border-radius:10px;
  border:1.5px solid var(--border2);
  background:var(--surface);
  color:var(--text2);
  font-size:13px;
  font-family:var(--font-body);
  font-weight:600;
  cursor:pointer;
  transition:all .13s;
}
.nav-btn:hover:not(:disabled){
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  transform:translateY(-1px);
}
.nav-btn:active:not(:disabled){transform:scale(.97)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.card-counter{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:800;
  color:var(--text2);
  letter-spacing:-.02em;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:3rem 1rem;
  color:var(--text3);
  font-size:13px;
  font-family:var(--font-body);
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:10px;
  border:2px dashed var(--border2);
  border-radius:16px;
  margin-bottom:.75rem;
}
.empty-icon{font-size:2.5rem}
.empty-title{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:700;
  color:var(--text2);
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(26,23,20,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--surface);
  border-radius:16px;
  padding:1.8rem;
  width:min(480px,92vw);
  border:1.5px solid var(--border2);
  box-shadow:0 16px 48px rgba(0,0,0,.18);
  animation:modalIn .2s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(12px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.modal h2{
  font-family:var(--font-display);
  font-size:1.25rem;
  font-weight:800;
  color:var(--text);
  margin-bottom:1.3rem;
  letter-spacing:-.03em;
}
.field{margin-bottom:1rem}
.field label{
  display:block;
  font-size:11px;
  font-family:var(--font-body);
  font-weight:700;
  color:var(--text3);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.07em;
}
.field textarea,.field input,.field select{
  width:100%;
  padding:9px 12px;
  border-radius:9px;
  border:1.5px solid var(--border2);
  background:var(--bg);
  color:var(--text);
  font-size:13.5px;
  font-family:var(--font-body);
  resize:vertical;
  outline:none;
  transition:border .13s,box-shadow .13s;
}
.field textarea:focus,.field input:focus,.field select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(255,79,48,.12);
}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.3rem}
.modal-btns button{
  padding:8px 18px;
  border-radius:9px;
  font-size:13px;
  font-family:var(--font-body);
  font-weight:600;
  cursor:pointer;
  transition:all .13s;
}
.modal-btns button:active{transform:scale(.97)}
.modal-btns .save{background:var(--accent);color:#fff;border:none}
.modal-btns .save:hover{background:#d93a1e}
.modal-btns .cancel{background:none;border:1.5px solid var(--border2);color:var(--text2)}
.modal-btns .cancel:hover{background:var(--surface2)}

/* bounce anim on card flip */
@keyframes bounceIn{
  0%{transform:scale(.95)}
  60%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
.scene:active .card-inner{animation:bounceIn .2s ease}

/* streak badge */
.streak-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:linear-gradient(135deg,#ff4f30,#ffa630);
  color:#fff;
  font-family:var(--font-display);
  font-size:11px;
  font-weight:700;
  padding:3px 10px;
  border-radius:20px;
  margin-left:10px;
  letter-spacing:.03em;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const DEFAULT_SUBJECTS = [
  { id: "js", name: "JavaScript", icon: "📄" },
];

const DEFAULT_CARDS = [
  { id:1,  subject:"js", q:"What is a closure in JavaScript?",                       a:"A function that retains access to variables from its outer scope, even after the outer function has returned.",                                      category:"none" },
  { id:2,  subject:"js", q:"What is the difference between == and ===?",             a:"== does type coercion before comparing. === checks value AND type strictly with no coercion at all.",                                               category:"none" },
  { id:3,  subject:"js", q:"What does Array.prototype.map() return?",                a:"A new array of the same length, where each element is the result of calling the callback on the original element.",                                  category:"none" },
  { id:4,  subject:"js", q:"What is event bubbling?",                                a:"When an event fires on a child element, it propagates up through parent elements in the DOM tree, triggering their listeners.",                      category:"none" },
  { id:5,  subject:"js", q:"What is the purpose of 'use strict'?",                   a:"Enables strict mode: prevents undeclared variables, disables unsafe features, and throws errors for silent mistakes.",                               category:"none" },
  { id:6,  subject:"js", q:"What is a Promise?",                                     a:"An object representing the eventual completion or failure of an async operation. States: pending, fulfilled, rejected.",                             category:"none" },
  { id:7,  subject:"js", q:"What is the difference between var, let, and const?",    a:"var is function-scoped and hoisted. let is block-scoped and reassignable. const is block-scoped and cannot be reassigned (objects remain mutable).", category:"none" },
  { id:8,  subject:"js", q:"What does Array.prototype.reduce() do?",                 a:"Applies a reducer function to each element, accumulating a single output value. Useful for sums, flattening, or grouping.",                         category:"none" },
  { id:9,  subject:"js", q:"What is the event loop?",                                a:"A mechanism that processes the call stack and task queues to enable non-blocking async behavior in JavaScript's single-threaded runtime.",           category:"none" },
  { id:10, subject:"js", q:"What is prototypal inheritance?",                        a:"Objects inherit properties and methods from a prototype object. Lookups traverse the prototype chain until found or undefined.",                      category:"none" },
  { id:11, subject:"js", q:"What does async / await do?",                            a:"Syntactic sugar over Promises. async marks a function as returning a Promise; await pauses execution until that Promise resolves.",                  category:"none" },
  { id:12, subject:"js", q:"What is the difference between null and undefined?",     a:"undefined means a variable was declared but not assigned. null is an intentional, explicit absence of a value set by the developer.",               category:"none" },
  { id:13, subject:"js", q:"What is hoisting in JavaScript?",                        a:"JavaScript's behavior of moving declarations (not initializations) to the top of their scope before execution. var and function declarations are hoisted.", category:"none" },
  { id:14, subject:"js", q:"What is the difference between call(), apply(), bind()?",a:"call() invokes with individual args. apply() invokes with an array of args. bind() returns a new function with 'this' permanently bound.",           category:"none" },
  { id:15, subject:"js", q:"What is a higher-order function?",                       a:"A function that takes another function as an argument, or returns a function as its result. Examples: map, filter, reduce.",                        category:"none" },
];

const SUBJECT_ICONS = ["📄","🧮","🔬","📐","💡","🌍","📚","🎯","🧪","💻","🗂️","⚙️"];

const FILTER_TABS = [
  { key:"all",      label:"All" },
  { key:"done",     label:"✓ Done" },
  { key:"revision", label:"↺ Revision" },
  { key:"weak",     label:"⚠ Weak" },
  { key:"none",     label:"Untagged" },
];

function loadState() {
  try {
    const s = localStorage.getItem("jsfcards_v4_vibey");
    if (s) return JSON.parse(s);
  } catch {}
  return { cards: DEFAULT_CARDS, subjects: DEFAULT_SUBJECTS };
}
function saveState(st) {
  try { localStorage.setItem("jsfcards_v4_vibey", JSON.stringify(st)); } catch {}
}

function ProgressBar({ current, total, filterLabel }) {
  const pct = total === 0 ? 0 : Math.round((current / total) * 100);
  return (
    <>
      <div className="prog-row">
        <span>{pct}% · {filterLabel}</span>
        <span>{total === 0 ? "0 / 0" : `${current + 1} / ${total}`}</span>
      </div>
      <div className="prog-track">
        <div className="prog-fill" style={{ width: `${pct}%` }} />
      </div>
    </>
  );
}

function FlashCard({ card, flipped, onFlip }) {
  const pipClass = card.category !== "none" ? card.category : null;
  const pipLabel = card.category === "done" ? "✓ Done" : card.category === "revision" ? "↺ Revision" : card.category === "weak" ? "⚠ Weak" : "";
  return (
    <div className="scene" onClick={onFlip} role="button" aria-label={flipped ? "Click to see question" : "Click to see answer"}>
      <div className={`card-inner ${flipped ? "flipped" : ""}`}>
        <div className="card-face card-front">
          {pipClass && <span className={`cat-pip ${pipClass}`}>{pipLabel}</span>}
          <p className="card-tag">Question</p>
          <p className="card-q-text">{card.q}</p>
          <span className="flip-hint">click to flip →</span>
        </div>
        <div className="card-face card-back">
          <p className="card-tag">Answer</p>
          <p className="card-a-text">{card.a}</p>
          <span className="flip-hint" style={{color:'rgba(255,255,255,.3)'}}>click to flip →</span>
        </div>
      </div>
    </div>
  );
}

function StatsBar({ cards }) {
  const total    = cards.length;
  const done     = cards.filter(c => c.category === "done").length;
  const revision = cards.filter(c => c.category === "revision").length;
  const weak     = cards.filter(c => c.category === "weak").length;
  return (
    <div className="stats">
      <div className="stat"><div className="stat-n">{total}</div><div className="stat-l">Total</div></div>
      <div className="stat"><div className="stat-n done">{done}</div><div className="stat-l">Done</div></div>
      <div className="stat"><div className="stat-n rev">{revision}</div><div className="stat-l">Revision</div></div>
      <div className="stat"><div className="stat-n weak">{weak}</div><div className="stat-l">Weak</div></div>
    </div>
  );
}

function AddCardModal({ onClose, onSave, subjects, defaultSubject }) {
  const [q, setQ] = useState("");
  const [a, setA] = useState("");
  const [cat, setCat] = useState("none");
  const [sub, setSub] = useState(defaultSubject || subjects[0]?.id || "");

  const submit = () => {
    if (!q.trim() || !a.trim()) { alert("Fill in both question and answer!"); return; }
    onSave({ q: q.trim(), a: a.trim(), category: cat, subject: sub });
    onClose();
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>✦ New Flashcard</h2>
        <div className="field">
          <label>Subject</label>
          <select value={sub} onChange={e => setSub(e.target.value)}>
            {subjects.map(s => <option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Question</label>
          <textarea rows={3} value={q} onChange={e => setQ(e.target.value)} placeholder="e.g. What is a pure function?" autoFocus />
        </div>
        <div className="field">
          <label>Answer</label>
          <textarea rows={4} value={a} onChange={e => setA(e.target.value)} placeholder="e.g. A function with no side effects…" />
        </div>
        <div className="field">
          <label>Initial category</label>
          <select value={cat} onChange={e => setCat(e.target.value)}>
            <option value="none">Untagged</option>
            <option value="done">✓ Done</option>
            <option value="revision">↺ Revision</option>
            <option value="weak">⚠ Weak</option>
          </select>
        </div>
        <div className="modal-btns">
          <button className="cancel" onClick={onClose}>Cancel</button>
          <button className="save" onClick={submit}>Save card ✦</button>
        </div>
      </div>
    </div>
  );
}

function AddSubjectModal({ onClose, onSave }) {
  const [name, setName] = useState("");
  const [icon, setIcon] = useState("📄");

  const submit = () => {
    if (!name.trim()) { alert("Enter a subject name."); return; }
    onSave({ name: name.trim(), icon });
    onClose();
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>✦ New Subject</h2>
        <div className="field">
          <label>Pick an icon</label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:4 }}>
            {SUBJECT_ICONS.map(ic => (
              <button key={ic} onClick={() => setIcon(ic)} style={{
                fontSize:18, padding:"5px 7px", borderRadius:8, cursor:"pointer",
                border: icon === ic ? "2.5px solid #ff4f30" : "1.5px solid #ccc8c0",
                background: icon === ic ? "#fff0ed" : "none",
                transition:"all .12s",
                transform: icon === ic ? "scale(1.1)" : "scale(1)"
              }}>{ic}</button>
            ))}
          </div>
        </div>
        <div className="field">
          <label>Subject name</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Data Structures" autoFocus />
        </div>
        <div className="modal-btns">
          <button className="cancel" onClick={onClose}>Cancel</button>
          <button className="save" onClick={submit}>Create ✦</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(loadState);
  const [activeSubject, setActiveSubject] = useState(state.subjects[0]?.id || "js");
  const [filter, setFilter] = useState("all");
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showAddCard, setShowAddCard] = useState(false);
  const [showAddSubject, setShowAddSubject] = useState(false);
  const [flipCount, setFlipCount] = useState(0);

  const { cards, subjects } = state;

  const subjectCards = cards.filter(c => c.subject === activeSubject);
  const filtered = filter === "all" ? subjectCards : subjectCards.filter(c => c.category === filter);
  const card = filtered[idx] || null;

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => { setIdx(0); setFlipped(false); }, [filter, activeSubject]);

  const go = useCallback((dir) => {
    const next = Math.max(0, Math.min(idx + dir, filtered.length - 1));
    if (next === idx) return;
    setFlipped(false);
    setTimeout(() => setIdx(next), 60);
  }, [idx, filtered.length]);

  const markCat = useCallback((cat) => {
    if (!card) return;
    setState(prev => ({ ...prev, cards: prev.cards.map(c => c.id === card.id ? { ...c, category: cat } : c) }));
  }, [card]);

  const handleFlip = () => {
    setFlipped(f => !f);
    setFlipCount(n => n + 1);
  };

  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      if (tag === "TEXTAREA" || tag === "INPUT" || tag === "SELECT") return;
      if (e.key === "ArrowLeft")  go(-1);
      if (e.key === "ArrowRight") go(+1);
      if (e.key === " ") { e.preventDefault(); handleFlip(); }
      if (e.key === "1") markCat("done");
      if (e.key === "2") markCat("revision");
      if (e.key === "3") markCat("weak");
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [go, markCat]);

  const addCard = (newCard) => {
    setState(prev => ({ ...prev, cards: [...prev.cards, { ...newCard, id: Date.now() }] }));
  };

  const addSubject = ({ name, icon }) => {
    const id = name.toLowerCase().replace(/\s+/g, "_") + "_" + Date.now();
    setState(prev => ({ ...prev, subjects: [...prev.subjects, { id, name, icon }] }));
    setActiveSubject(id);
  };

  const deleteSubject = (id) => {
    if (!window.confirm("Delete this subject and all its cards?")) return;
    setState(prev => ({
      ...prev,
      subjects: prev.subjects.filter(s => s.id !== id),
      cards: prev.cards.filter(c => c.subject !== id),
    }));
    if (activeSubject === id) {
      const remaining = state.subjects.filter(s => s.id !== id);
      setActiveSubject(remaining[0]?.id || "");
    }
  };

  const activeSubjectObj = subjects.find(s => s.id === activeSubject);
  const filterLabel = FILTER_TABS.find(t => t.key === filter)?.label || "All";
  const doneCount = subjectCards.filter(c => c.category === "done").length;
  const pct = subjectCards.length > 0 ? Math.round((doneCount / subjectCards.length) * 100) : 0;

  return (
    <div className="layout">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sidebar-header">
          <span className="sidebar-title">Subjects</span>
          <button className="sidebar-add-set" onClick={() => setShowAddSubject(true)} title="New subject">+</button>
        </div>
        <div className="sidebar-section">
          {subjects.map(s => {
            const count = cards.filter(c => c.subject === s.id).length;
            return (
              <div key={s.id} className={`sidebar-item ${activeSubject === s.id ? "active" : ""}`} onClick={() => setActiveSubject(s.id)}>
                <span className="sidebar-item-icon">{s.icon}</span>
                <span className="sidebar-item-name">{s.name}</span>
                <span className="sidebar-item-count">{count}</span>
                {subjects.length > 1 && (
                  <button className="sidebar-del-btn" onClick={e => { e.stopPropagation(); deleteSubject(s.id); }} title="Delete">×</button>
                )}
              </div>
            );
          })}
        </div>
        {subjects.length === 0 && (
          <p style={{ fontSize:12, color:"var(--text3)", padding:"0 14px", fontFamily:"var(--font-body)" }}>No subjects yet.</p>
        )}
        <div className="sidebar-footer">flash<span>cards</span><br/>
          <span style={{fontSize:12,fontFamily:"var(--font-body)",fontWeight:400,color:"var(--text3)",letterSpacing:"normal"}}>
            {flipCount} flips today
          </span>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        {/* Top Bar */}
        <div className="topbar">
          <div className="topbar-left">
            <h1>
              {activeSubjectObj && <span className="subject-icon">{activeSubjectObj.icon}</span>}
              {activeSubjectObj ? activeSubjectObj.name : "Flashcards"}
              {pct === 100 && subjectCards.length > 0 && (
                <span className="streak-badge">🔥 100%</span>
              )}
            </h1>
            <div className="subject-label">{subjectCards.length} card{subjectCards.length !== 1 ? "s" : ""} · {pct}% done</div>
          </div>
          <div className="topbar-right">
            <button className="icon-btn add-btn" onClick={() => setShowAddCard(true)}>+ Add card</button>
          </div>
        </div>

        {/* Stats */}
        <StatsBar cards={subjectCards} />

        {/* Filter Tabs */}
        <div className="tabs">
          {FILTER_TABS.map(t => (
            <button key={t.key} className={`tab ${filter === t.key ? "active" : ""}`} onClick={() => setFilter(t.key)}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Progress */}
        <ProgressBar current={idx} total={filtered.length} filterLabel={filterLabel} />

        {/* Card */}
        {card ? (
          <FlashCard card={card} flipped={flipped} onFlip={handleFlip} />
        ) : (
          <div className="empty">
            <span className="empty-icon">🃏</span>
            <span className="empty-title">Nothing here yet</span>
            <span>{filter !== "all" ? "Switch filter or add cards to this category." : "Click '+ Add card' to get started."}</span>
          </div>
        )}

        {/* Keyboard Hint */}
        <p className="hint">
          <span className="kbd">Space</span> flip
          <span style={{color:"var(--text3)"}}>·</span>
          <span className="kbd">←</span> <span className="kbd">→</span> navigate
          <span style={{color:"var(--text3)"}}>·</span>
          <span className="kbd">1</span> Done
          <span className="kbd">2</span> Revision
          <span className="kbd">3</span> Weak
        </p>

        {/* Category Buttons */}
        {card && (
          <div className="cat-row">
            <span className="cat-label">Mark:</span>
            {["done", "revision", "weak"].map(k => (
              <button key={k} className={`cat-btn ${k} ${card.category === k ? "active" : ""}`} onClick={() => markCat(k)}>
                {k === "done" ? "✓ Done" : k === "revision" ? "↺ Revision" : "⚠ Weak"}
              </button>
            ))}
            {card.category !== "none" && (
              <button className="cat-btn clear" onClick={() => markCat("none")}>Clear</button>
            )}
          </div>
        )}

        {/* Navigation */}
        <div className="nav-row">
          <button className="nav-btn" onClick={() => go(-1)} disabled={idx === 0 || !card}>← Prev</button>
          <span className="card-counter">{filtered.length === 0 ? "—" : `${idx + 1} / ${filtered.length}`}</span>
          <button className="nav-btn" onClick={() => go(+1)} disabled={idx >= filtered.length - 1 || !card}>Next →</button>
        </div>
      </div>

      {/* Modals */}
      {showAddCard && (
        <AddCardModal
          onClose={() => setShowAddCard(false)}
          onSave={addCard}
          subjects={subjects}
          defaultSubject={activeSubject}
        />
      )}
      {showAddSubject && (
        <AddSubjectModal onClose={() => setShowAddSubject(false)} onSave={addSubject} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
